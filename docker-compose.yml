version: "3.8"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: intensiti
      JWT_SECRET: ${JWT_SECRET:-intensiti-production-secret-key-2024}
      CORS_ORIGINS: "*"
      OPENWEATHER_KEY: ${OPENWEATHER_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://72.61.199.80:8080
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
  uploads_data:
